<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5W1H ルーレット</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a14;
    --panel: #11112a;
    --border: #2a2a5a;
    --accent1: #ff3cac;
    --accent2: #784ba0;
    --accent3: #2b86c5;
    --gold: #ffd700;
    --text: #e8e8ff;
    --dim: #888aaa;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,60,172,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(43,134,197,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }

  @keyframes twinkle {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: var(--max-op); transform: scale(1.2); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Header */
  header {
    text-align: center;
  }

  .logo {
    font-family: 'Zen Dots', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    background: linear-gradient(90deg, var(--accent1), #c86dd7, var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-shadow: none;
    position: relative;
    display: inline-block;
  }

  .logo::after {
    content: '🎰';
    font-size: 0.7em;
    -webkit-text-fill-color: initial;
    margin-left: 10px;
  }

  .subtitle {
    color: var(--dim);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* Genre Selector */
  .genre-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }

  .genre-label {
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .genre-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--dim);
    transition: all 0.2s;
    font-family: inherit;
  }

  .chip:hover { border-color: var(--accent2); color: var(--text); }

  .chip.active {
    border-color: var(--accent1);
    background: rgba(255,60,172,0.15);
    color: var(--accent1);
    font-weight: 700;
  }

  /* Slots grid */
  .slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  @media (max-width: 480px) {
    .slots { grid-template-columns: repeat(2, 1fr); }
  }

  .slot {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .slot.spinning {
    border-color: var(--accent1);
    box-shadow: 0 0 18px rgba(255,60,172,0.3);
    animation: slotPulse 0.15s ease-in-out infinite alternate;
  }

  @keyframes slotPulse {
    from { box-shadow: 0 0 8px rgba(255,60,172,0.2); }
    to { box-shadow: 0 0 24px rgba(255,60,172,0.5); }
  }

  .slot.done {
    border-color: var(--accent3);
    box-shadow: 0 0 12px rgba(43,134,197,0.2);
  }

  .slot-tag {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent1);
    background: rgba(255,60,172,0.12);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .slot-question {
    font-size: 0.72rem;
    color: var(--dim);
  }

  .slot-value {
    font-size: 1.05rem;
    font-weight: 700;
    text-align: center;
    min-height: 2.2em;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.3;
    color: var(--text);
    transition: all 0.1s;
  }

  .slot-value.rolling {
    opacity: 0.6;
    transform: translateY(-2px);
  }

  /* Slot bottom buttons row */
  .slot-btns {
    display: flex;
    gap: 5px;
    margin-top: 2px;
  }

  /* Individual spin button */
  .slot-spin-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--dim);
    font-size: 0.7rem;
    padding: 3px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .slot-spin-btn:hover {
    border-color: var(--accent1);
    color: var(--accent1);
  }

  .slot-spin-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--dim);
  }

  /* Lock button */
  .slot-lock-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--dim);
    font-size: 0.7rem;
    padding: 3px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s;
    line-height: 1;
  }

  .slot-lock-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Locked slot state */
  .slot.locked {
    border-color: var(--gold) !important;
    box-shadow: 0 0 14px rgba(255,215,0,0.25);
    background: rgba(255,215,0,0.05);
  }

  .slot.locked .slot-tag {
    color: var(--gold);
    background: rgba(255,215,0,0.15);
  }

  .slot.locked .slot-lock-btn {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,215,0,0.15);
  }

  .slot.locked .slot-value {
    color: var(--gold);
  }

  /* Lock badge on slot */
  .lock-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 0.75rem;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .slot.locked .lock-badge {
    opacity: 1;
    transform: scale(1);
  }

  /* Freeword input */
  .slot-freeword {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.78rem;
    padding: 5px 8px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    display: none;
  }

  .slot-freeword::placeholder { color: var(--dim); }

  .slot-freeword:focus {
    border-color: var(--accent3);
    background: rgba(43,134,197,0.08);
  }

  .slot.freeword-mode .slot-freeword { display: block; }
  .slot.freeword-mode .slot-value { display: none; }
  .slot.freeword-mode .slot-spin-btn { opacity: 0.3; pointer-events: none; }
  .slot.freeword-mode .slot-lock-btn { opacity: 0.3; pointer-events: none; }

  .slot.freeword-mode {
    border-color: var(--accent3) !important;
    box-shadow: 0 0 12px rgba(43,134,197,0.2);
  }

  .slot.freeword-mode .slot-tag {
    color: var(--accent3);
    background: rgba(43,134,197,0.12);
  }

  .slot-edit-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--dim);
    font-size: 0.7rem;
    padding: 3px 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    line-height: 1;
  }

  .slot-edit-btn:hover {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .slot.freeword-mode .slot-edit-btn {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(43,134,197,0.12);
    pointer-events: all;
    opacity: 1;
  }

  /* Main button */
  .spin-btn {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'Zen Dots', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(255,60,172,0.35);
  }

  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,60,172,0.45); }
  .spin-btn:active { transform: translateY(0px); }

  .spin-btn::before {
    content: '';
    position: absolute;
    inset: -100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2.5s linear infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%) rotate(-20deg); }
    100% { transform: translateX(200%) rotate(-20deg); }
  }

  .spin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Result box */
  .result-box {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
  }

  .result-box.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .result-label {
    font-size: 0.7rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .result-sentence {
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text);
    border-left: 3px solid var(--accent1);
    padding-left: 14px;
    min-height: 2em;
  }

  .result-sentence .highlight {
    color: var(--gold);
  }

  .result-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-copy, .btn-prompt, .btn-save {
    flex: 1;
    min-width: 120px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    border: 1.5px solid;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .btn-copy {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(43,134,197,0.1);
  }
  .btn-copy:hover { background: rgba(43,134,197,0.25); }

  .btn-prompt {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,215,0,0.08);
  }
  .btn-prompt:hover { background: rgba(255,215,0,0.18); }

  .btn-save {
    border-color: var(--accent2);
    color: #c86dd7;
    background: rgba(120,75,160,0.1);
  }
  .btn-save:hover { background: rgba(120,75,160,0.25); }

  .btn-copy.copied {
    background: rgba(43,134,197,0.35);
    color: white;
  }

  /* Prompt preview */
  .prompt-preview {
    background: rgba(255,215,0,0.06);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.82rem;
    color: #e8d07a;
    line-height: 1.6;
    display: none;
    word-break: break-all;
  }

  .prompt-preview.open { display: block; }

  .copy-prompt-btn {
    margin-top: 8px;
    background: none;
    border: 1px solid rgba(255,215,0,0.4);
    color: var(--gold);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .copy-prompt-btn:hover { background: rgba(255,215,0,0.15); }

  /* History */
  .history-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-title {
    font-size: 0.7rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .clear-btn {
    background: none;
    border: 1px solid rgba(255,60,172,0.3);
    color: rgba(255,60,172,0.6);
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--accent1); color: var(--accent1); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .history-item:hover {
    border-color: var(--accent2);
    color: var(--text);
  }

  .history-genre-tag {
    font-size: 0.65rem;
    color: var(--accent2);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .history-empty {
    text-align: center;
    color: var(--dim);
    font-size: 0.82rem;
    padding: 20px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(43,134,197,0.9);
    color: white;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }

  /* Confetti particle */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    font-size: 1.4rem;
    animation: confettiFall 1.4s ease-out forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(120px) rotate(360deg); }
  }

  section.card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <header>
    <div class="logo">5W1H ルーレット</div>
    <div class="subtitle">回してカオスな文章を生成 → AIで画像を作ろう ✨</div>
  </header>

  <!-- Genre selector -->
  <div class="genre-bar">
    <span class="genre-label">🎭 ジャンル</span>
    <div class="genre-chips" id="genreChips"></div>
  </div>

  <!-- Slots -->
  <div class="slots" id="slots"></div>

  <!-- Main spin button -->
  <button class="spin-btn" id="spinBtn" onclick="spinAll()">🎰 全部まわす！</button>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="result-label">✨ 生成された文章</div>
    <div class="result-sentence" id="resultSentence">—</div>
    <div class="result-actions">
      <button class="btn-copy" id="copyBtn" onclick="copySentence()">📋 コピー</button>
      <button class="btn-prompt" onclick="togglePrompt()">🎨 画像プロンプト</button>
      <button class="btn-save" onclick="saveToHistory()">💾 保存</button>
    </div>
    <div class="prompt-preview" id="promptPreview">
      <div id="promptText"></div>
      <button class="copy-prompt-btn" onclick="copyPrompt()">📋 プロンプトをコピー</button>
    </div>
  </div>

  <hr class="divider">

  <!-- History -->
  <section class="card history-section">
    <div class="history-header">
      <div class="history-title">📜 保存した文章</div>
      <button class="clear-btn" onclick="clearHistory()">全消去</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">まだ保存された文章がありません</div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

    fairy: [
      '魔法の杖を振って','歌に乗せて','妖精の力を借りて','願いを三回唱えて',
      '星の光を手繰り寄せて','風を味方につけて','涙を魔法に変えて',
      '動物たちの助けを借りて','見えない翼で飛んで','月明かりだけを頼りに',
      '呪文なしで奇跡を起こして','心の力だけで',
    ],
    samurai: [
      '一刀のもとに','静かな怒りをもって','型どおり丁寧に','目にも留まらぬ速さで',
      '無言のまま','刀を抜かずに','片膝をついて','息を止めて',
      '師匠の教えを胸に','背筋を伸ばして','覚悟を決めた顔で',
      '返り血も厭わずに',
    ],
    cyber: [
      'コードを書きながら','バックドアを使って','量子暗号化で','デジタルゴーストとして',
      '電脳接続したまま','義体の隠し機能で','ウイルスを盾にして',
      'AIと同期しながら','光速のキーストロークで','ジャックインしながら',
      '電子迷彩を纏って','ゼロトレースモードで',
    ],
    gourmet: [
      '熟練の手さばきで','旬の素材だけを使って','秘伝のレシピ通りに','なんと素手で',
      'ひとつまみの愛情を加えて','三日三晩かけて','食材と対話しながら',
      '完璧なタイミングで','笑顔だけを燃料にして','涙をこらえながら',
      '師匠の幻を見ながら','ただひたすら無心で',
    ],
  }
};

const STYLE_HINTS = {
  random: ['デジタルアート風', 'アニメスタイル', '水彩画風', '油絵風', 'ピクセルアート風'],
  sf: ['SF映画風', 'レトロフューチャー', 'スペースオペラスタイル', 'サイバーパンク風'],
  horror: ['ホラー映画スチール風', 'ダークファンタジー', 'ゴシック絵画風', 'クリーピーパスタ風'],
  fairy: ['童話挿絵風', '日本アニメ映画風', '絵本イラスト風', 'ファンタジー水彩'],
  samurai: ['浮世絵風', '時代劇映画スチール', '墨絵スタイル', '江戸時代の版画風'],
  cyber: ['グリッチアート', 'ネオンサイバーパンク', 'ホログラム風', 'デジタルグリッチ'],
  gourmet: ['料理写真風', 'イラストレーション', 'ミニマルフード写真', 'ヴィンテージ食品ポスター'],
};

// ============================================================
// STATE
// ============================================================
const SLOT_KEYS = ['who','when','where','what','why','how'];
const SLOT_META = {
  who:   { tag: 'WHO',   q: '誰が' },
  when:  { tag: 'WHEN',  q: 'いつ' },
  where: { tag: 'WHERE', q: 'どこで' },
  what:  { tag: 'WHAT',  q: 'なにを' },
  why:   { tag: 'WHY',   q: 'なぜ' },
  how:   { tag: 'HOW',   q: 'どのように' },
};

let current = {};
let locked = {};   // tracks which slots are locked
let currentGenre = 'random';
let history = JSON.parse(localStorage.getItem('roulette_history') || '[]');
let spinning = false;

// ============================================================
// INIT
// ============================================================
function init() {
  buildStars();
  buildGenreChips();
  buildSlots();
  renderHistory();
  SLOT_KEYS.forEach(k => current[k] = pick(k));
  renderSentence();
}

function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --max-op:${0.1+Math.random()*0.5};
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(s);
  }
}

function buildGenreChips() {
  const container = document.getElementById('genreChips');
  GENRES.forEach(g => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (g.id === currentGenre ? ' active' : '');
    chip.textContent = g.label;
    chip.onclick = () => selectGenre(g.id);
    chip.dataset.id = g.id;
    container.appendChild(chip);
  });
}

function buildSlots() {
  const container = document.getElementById('slots');
  SLOT_KEYS.forEach(k => {
    const meta = SLOT_META[k];
    const div = document.createElement('div');
    div.className = 'slot';
    div.id = 'slot-' + k;
    div.innerHTML = `
      <div class="lock-badge">🔒</div>
      <div class="slot-tag">${meta.tag}</div>
      <div class="slot-question">${meta.q}</div>
      <div class="slot-value" id="val-${k}">—</div>
      <input class="slot-freeword" id="free-${k}" type="text" placeholder="自由入力..." oninput="onFreewordInput('${k}')" />
      <div class="slot-btns">
        <button class="slot-spin-btn" id="spin-btn-${k}" onclick="spinOne('${k}')">🔄 単体</button>
        <button class="slot-edit-btn" id="edit-btn-${k}" onclick="toggleFreeword('${k}')">✏️</button>
        <button class="slot-lock-btn" id="lock-btn-${k}" onclick="toggleLock('${k}')">🔓</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// ============================================================
// LOGIC
// ============================================================
function pick(key) {
  const pool = DATA[key][currentGenre] || DATA[key]['random'];
  return pool[Math.floor(Math.random() * pool.length)];
}

function selectGenre(id) {
  currentGenre = id;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });
}

function toggleFreeword(key) {
  const slot = document.getElementById('slot-' + key);
  const input = document.getElementById('free-' + key);
  const isFree = slot.classList.toggle('freeword-mode');

  if (isFree) {
    // entering freeword mode — unlock if locked
    if (locked[key]) toggleLock(key);
    input.value = current[key] || '';
    input.focus();
    showToast(`✏️ フリーワードモード ON`);
  } else {
    // exiting — restore to last current value
    if (!input.value.trim()) {
      current[key] = pick(key);
      document.getElementById('val-' + key).textContent = current[key];
    }
    renderSentence();
    showToast(`✏️ フリーワードモード OFF`);
  }
}

function onFreewordInput(key) {
  const val = document.getElementById('free-' + key).value;
  current[key] = val || '？';
  renderSentence();
}

function toggleLock(key) {
  locked[key] = !locked[key];
  const slot = document.getElementById('slot-' + key);
  const lockBtn = document.getElementById('lock-btn-' + key);
  const spinBtn = document.getElementById('spin-btn-' + key);

  if (locked[key]) {
    slot.classList.add('locked');
    lockBtn.textContent = '🔒';
    spinBtn.disabled = true;
    showToast(`🔒 "${current[key]}" を固定しました`);
  } else {
    slot.classList.remove('locked');
    lockBtn.textContent = '🔓';
    spinBtn.disabled = false;
    showToast(`🔓 固定を解除しました`);
  }
}


function spinAll() {
  if (spinning) return;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  spinning = true;

  const freeKeys = SLOT_KEYS.filter(k => !locked[k] && !document.getElementById('slot-' + k).classList.contains('freeword-mode'));

  if (freeKeys.length === 0) {
    spinning = false;
    btn.disabled = false;
    showToast('全スロットが固定中です！🔒');
    return;
  }

  const delays = freeKeys.map(() => Math.random() * 600);
  const maxDelay = Math.max(...delays);
  const ROLL_DURATION = 1000;

  freeKeys.forEach((k, i) => {
    setTimeout(() => {
      animateSlot(k, ROLL_DURATION - delays[i], () => {
        current[k] = pick(k);
        document.getElementById('val-' + k).textContent = current[k];
        document.getElementById('slot-' + k).classList.remove('spinning');
        document.getElementById('slot-' + k).classList.add('done');
      });
    }, delays[i]);
  });

  setTimeout(() => {
    spinning = false;
    btn.disabled = false;
    renderSentence();
    launchConfetti();
    freeKeys.forEach(k => {
      setTimeout(() => document.getElementById('slot-' + k).classList.remove('done'), 1500);
    });
  }, maxDelay + ROLL_DURATION + 100);
}

function spinOne(key) {
  if (spinning) return;
  const ROLL = 700;
  animateSlot(key, ROLL, () => {
    current[key] = pick(key);
    document.getElementById('val-' + key).textContent = current[key];
    document.getElementById('slot-' + key).classList.remove('spinning');
    setTimeout(() => {
      document.getElementById('slot-' + key).classList.remove('done');
      renderSentence();
    }, 800);
    document.getElementById('slot-' + key).classList.add('done');
  });
}

function animateSlot(key, duration, callback) {
  const slot = document.getElementById('slot-' + key);
  const val = document.getElementById('val-' + key);
  slot.classList.add('spinning');

  const pool = DATA[key][currentGenre] || DATA[key]['random'];
  const start = Date.now();
  let intervalMs = 80;

  function tick() {
    const elapsed = Date.now() - start;
    val.classList.add('rolling');
    val.textContent = pool[Math.floor(Math.random() * pool.length)];
    setTimeout(() => val.classList.remove('rolling'), 50);

    if (elapsed < duration) {
      intervalMs = 80 + (elapsed / duration) * 120;
      setTimeout(tick, intervalMs);
    } else {
      callback();
    }
  }
  tick();
}

function buildSentence() {
  const { who, when, where, what, why, how } = current;
  return `${who}は、${when}、${where}、${why}、${how}${what}。`;
}

function renderSentence() {
  const box = document.getElementById('resultBox');
  const el = document.getElementById('resultSentence');
  el.textContent = buildSentence();
  box.classList.add('visible');
  document.getElementById('promptPreview').classList.remove('open');
}

function copySentence() {
  const sentence = buildSentence();
  navigator.clipboard.writeText(sentence).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピーした！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    }, 1800);
    showToast('クリップボードにコピーしました！');
  });
}

function buildPrompt() {
  const sentence = buildSentence();
  const styles = STYLE_HINTS[currentGenre] || STYLE_HINTS['random'];
  const style = styles[Math.floor(Math.random() * styles.length)];
  return `${sentence} ${style}で描いてください。鮮やかで詳細なイラスト。`;
}

function togglePrompt() {
  const preview = document.getElementById('promptPreview');
  if (preview.classList.contains('open')) {
    preview.classList.remove('open');
  } else {
    document.getElementById('promptText').textContent = buildPrompt();
    preview.classList.add('open');
  }
}

function copyPrompt() {
  const prompt = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(prompt).then(() => {
    showToast('プロンプトをコピーしました！');
  });
}

function saveToHistory() {
  const sentence = buildSentence();
  const genreLabel = GENRES.find(g => g.id === currentGenre)?.label || '';
  history.unshift({ sentence, genre: genreLabel, time: new Date().toLocaleString('ja-JP') });
  if (history.length > 20) history.pop();
  localStorage.setItem('roulette_history', JSON.stringify(history));
  renderHistory();
  showToast('保存しました！');
}

function clearHistory() {
  if (!confirm('保存した文章を全部消しますか？')) return;
  history = [];
  localStorage.removeItem('roulette_history');
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">まだ保存された文章がありません</div>';
    return;
  }
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="copyHistoryItem(${i})">
      <div class="history-genre-tag">${h.genre} · ${h.time}</div>
      ${h.sentence}
    </div>
  `).join('');
}

function copyHistoryItem(i) {
  navigator.clipboard.writeText(history[i].sentence).then(() => {
    showToast('コピーしました！');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function launchConfetti() {
  const emojis = ['✨','🎉','🎊','💫','⭐','🌟','🎰','🎲'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top = (20 + Math.random() * 30) + '%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, i * 80);
  }
}

init();
</script>
